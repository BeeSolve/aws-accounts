AWSTemplateFormatVersion: "2010-09-09"
Description: "AWS Config recorder and delivery channel for centralized compliance monitoring"
Parameters:
  DeliveryBucketName:
    Type: String
    Description: S3 bucket name for Config delivery
  AllSupported:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  IncludeGlobalResourceTypes:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  DeliveryFrequency:
    Type: String
    Default: TwentyFour_Hours
    AllowedValues:
      - One_Hour
      - Three_Hours
      - Six_Hours
      - Twelve_Hours
      - TwentyFour_Hours
Resources:
  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/config.amazonaws.com/AWSServiceRoleForConfig"
      RecordingGroup:
        AllSupported: !Ref AllSupported
        IncludeGlobalResourceTypes: !Ref IncludeGlobalResourceTypes
  DeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    Properties:
      S3BucketName: !Ref DeliveryBucketName
      ConfigSnapshotDeliveryProperties:
        DeliveryFrequency: !Ref DeliveryFrequency
